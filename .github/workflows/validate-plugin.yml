#
# Plugin validation pipeline (plan §21.1).
#
# Every PR and every push to `main` runs the same gates a registry
# publisher would check before accepting a new plugin version:
#
#   1. `plugin.json` validates against the host's published JSON Schema
#      (`docs/plugins/plugin-manifest.schema.json` in
#      sh-selfhelp_backend).
#   2. The migration enforces the host AGENTS.md DB rule: plural
#      lowercase_snake_case table names, `id_<plural>` FK columns,
#      `pk_/fk_/idx_/uq_<plural>_<col>` constraint names. Any
#      `CREATE TABLE` that does not match the rule fails the build.
#   3. The plugin manifest's `dataAccess.ownedTables` lines up with the
#      tables the migration actually creates (no orphan ownership).
#   4. Backend (Symfony bundle): `composer install`, PHPStan, PHPUnit if
#      tests exist.
#   5. Frontend npm package: `npm ci`, type-check, `npm run build`.
#   6. Mobile npm package: same as frontend.
#   7. Host-singleton policy: the plugin must NOT pin React, React DOM,
#      `@selfhelp/shared`, `@mantine/core`, or `@tanstack/react-query`
#      under `dependencies` (only under `peerDependencies`).
#
# The job uses Node 22 and PHP 8.4 because the host backend / frontend
# already target them.

name: validate-plugin

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest:
    name: Manifest schema + ownership
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Try to pull the host's manifest schema from the public host repo
      # when available. When the host repo is private (most internal
      # environments) we fall back to the vendored schema copy at
      # `docs/plugins/plugin-manifest.schema.json` in this plugin repo,
      # which is refreshed by `npm run sync-host-schemas`. The plugin's
      # tagged release of that schema is the authoritative copy the
      # plugin was built against.
      #
      # Same-branch-or-main: coordinated cross-repo work happens on equally
      # named feature branches; validate against the host branch matching
      # this build's branch name when it exists, else against main. See
      # sh-selfhelp_backend/docs/developer/branch-merge-order.md.
      - name: Resolve host ref (same branch as this build, else main)
        id: host-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          REF="main"
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "main" ] && \
             git ls-remote --exit-code --heads \
               "https://x-access-token:${GH_TOKEN}@github.com/humdek-unibe-ch/sh-selfhelp_backend.git" \
               "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            REF="$BRANCH"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved sh-selfhelp_backend ref: ${REF} (build branch: ${BRANCH})"

      - name: Checkout host (for JSON Schemas)
        id: host-checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: humdek-unibe-ch/sh-selfhelp_backend
          ref: ${{ steps.host-ref.outputs.ref }}
          path: .host

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ajv-cli
        run: npm install --no-save --no-audit --no-fund ajv-cli@5 ajv-formats@3

      - name: Resolve manifest schema path
        id: schema
        run: |
          set -euo pipefail
          if [ -f ".host/docs/plugins/plugin-manifest.schema.json" ]; then
            echo "path=.host/docs/plugins/plugin-manifest.schema.json" >> "$GITHUB_OUTPUT"
            echo "Using host schema from .host/docs/plugins/."
          elif [ -f "docs/plugins/plugin-manifest.schema.json" ]; then
            echo "path=docs/plugins/plugin-manifest.schema.json" >> "$GITHUB_OUTPUT"
            echo "Using vendored schema at docs/plugins/plugin-manifest.schema.json."
          else
            echo "::error::Could not locate plugin-manifest.schema.json (neither in the host checkout nor under docs/plugins/)."
            exit 1
          fi

      - name: Validate plugin.json against host schema
        run: |
          set -euo pipefail
          npx ajv validate \
            -s "${{ steps.schema.outputs.path }}" \
            -d plugin.json \
            --strict=false

      - name: Verify dataAccess.ownedTables matches CREATE TABLE statements
        run: |
          set -euo pipefail
          declared=$(node -e "console.log((require('./plugin.json').dataAccess?.ownedTables ?? []).sort().join(','))")
          created=$(grep -h -oE 'CREATE TABLE [a-z_][a-z0-9_]*' backend/src/Migrations/*.php \
            | sed 's/^CREATE TABLE //' \
            | sort -u \
            | paste -sd, -)
          echo "declared: $declared"
          echo "created : $created"
          if [ "$declared" != "$created" ]; then
            echo "::error::dataAccess.ownedTables ($declared) does not match the CREATE TABLE statements in the migration ($created)."
            exit 1
          fi

  db-naming:
    name: DB naming convention
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Plural lowercase_snake_case table names
        run: |
          set -euo pipefail
          # Grab every `CREATE TABLE <name>` and verify it is plural
          # lowercase snake_case (ending in `s` or known plural form).
          # Forbid singular forms (`survey`, `user`, `data_cell`).
          violations=$(grep -h -oE 'CREATE TABLE [a-zA-Z_][a-zA-Z0-9_]*' backend/src/Migrations/*.php \
            | sed 's/^CREATE TABLE //' \
            | awk '{ if (!match($0, /^[a-z][a-z0-9_]*$/)) print "case: " $0; }')
          if [ -n "$violations" ]; then
            echo "::error::Tables violating lowercase_snake_case:"
            echo "$violations"
            exit 1
          fi
          echo "All CREATE TABLE names are lowercase_snake_case."

      - name: FK columns use id_<plural_target_table>
        run: |
          set -euo pipefail
          # Match `id_<word>` columns. Anything not in this canonical
          # pattern indicates a regression (e.g. `id_survey`,
          # `created_by_user_id`, `id_data_row` singular).
          bad=$(grep -h -oE 'FOREIGN KEY \([^)]*\)' backend/src/Migrations/*.php \
            | grep -oE '\bid_[a-z_]+\b' \
            | awk '
              {
                # Allowed forms: id_<plural>. Reject anything that ends
                # in a known singular word.
                if ($0 ~ /^id_(survey|user|data_row|data_cell|data_table|plugin|role|group|permission|lookup|api_route|menu_item|page|page_section|page_field|page_version|section|style|language|asset|node|file|element|field|conversation|message|attachment|notification|job|version)$/) {
                  print $0
                }
              }')
          if [ -n "$bad" ]; then
            echo "::error::FK columns using singular target table name (must be id_<plural>):"
            echo "$bad" | sort -u
            exit 1
          fi
          echo "All FK columns use id_<plural_target_table> naming."

      - name: Constraints use pk_/fk_/idx_/uq_<plural>_<col>
        run: |
          set -euo pipefail
          bad=$(grep -h -oE '(CONSTRAINT [a-zA-Z_][a-zA-Z0-9_]*|INDEX [a-zA-Z_][a-zA-Z0-9_]*|UNIQUE INDEX [a-zA-Z_][a-zA-Z0-9_]*)' backend/src/Migrations/*.php \
            | awk '{print $NF}' \
            | grep -vE '^(pk|fk|idx|uq)_[a-z][a-z0-9_]*$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Constraint / index names not following pk_/fk_/idx_/uq_<...>:"
            echo "$bad" | sort -u
            exit 1
          fi
          echo "All constraint / index names follow pk_/fk_/idx_/uq_<plural>_<col>."

  backend:
    name: Backend (composer install + PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, mbstring, json, pdo, pdo_mysql, sodium
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}

      - name: Composer install
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress -c backend/phpstan.neon.dist --memory-limit=1G

      - name: PHPUnit (if tests exist)
        run: |
          if [ -d backend/tests ] && [ -n "$(find backend/tests -name '*.php' -print -quit)" ]; then
            vendor/bin/phpunit --configuration backend/phpunit.xml.dist --bootstrap vendor/autoload.php
          else
            echo "No backend tests yet; skipping."
          fi

  frontend:
    name: Frontend npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # The plugin must compile against the @selfhelp/shared contract it
      # will actually run with. The npm-published SDK can lag behind
      # coordinated branch work (e.g. the PLUGIN_API_VERSION 0.1.0
      # reconciliation), so build the SDK from the shared branch matching
      # this build's branch name (else main) and override the npm-resolved
      # copy with that tarball (same-branch-or-main; see
      # sh-selfhelp_backend/docs/developer/branch-merge-order.md).
      - name: Resolve shared ref (same branch as this build, else main)
        id: shared-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          REF="main"
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "main" ] && \
             git ls-remote --exit-code --heads \
               "https://x-access-token:${GH_TOKEN}@github.com/humdek-unibe-ch/sh-selfhelp_shared.git" \
               "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            REF="$BRANCH"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved sh-selfhelp_shared ref: ${REF} (build branch: ${BRANCH})"

      - name: Checkout shared (for the branch-matched SDK build)
        uses: actions/checkout@v4
        with:
          repository: humdek-unibe-ch/sh-selfhelp_shared
          ref: ${{ steps.shared-ref.outputs.ref }}
          path: .shared

      - name: Build shared + pack a local tarball
        working-directory: .shared
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm pack --pack-destination "$GITHUB_WORKSPACE"

      # Plugins do not (and must not) ship a lock file: the host
      # provides the resolved versions of React / Mantine /
      # @selfhelp/shared via its own root lock. `npm install` re-runs
      # resolution against the plugin's `devDependencies` mirror,
      # which is enough for typecheck + build in CI.
      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Override @selfhelp/shared with the branch-built tarball
        working-directory: frontend
        run: |
          set -euo pipefail
          SHARED_TGZ="$(ls "$GITHUB_WORKSPACE"/selfhelp-shared-*.tgz | head -1)"
          echo "Overriding @selfhelp/shared with $SHARED_TGZ"
          npm install --no-save --no-audit --no-fund --legacy-peer-deps "$SHARED_TGZ"

      - name: Type-check
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Host-singleton policy
        working-directory: frontend
        run: |
          set -euo pipefail
          # The following packages MUST live under peerDependencies,
          # never under dependencies (otherwise the host runtime ends up
          # with multiple resolved copies and React explodes).
          forbidden=$(node -e "
            const p = require('./package.json');
            const deps = p.dependencies || {};
            const hostOnly = ['react','react-dom','@selfhelp/shared','@mantine/core','@tanstack/react-query'];
            const bad = hostOnly.filter(n => Object.prototype.hasOwnProperty.call(deps, n));
            console.log(bad.join(','));
          ")
          if [ -n "$forbidden" ]; then
            echo "::error::Host-singleton packages pinned under dependencies: $forbidden (move them to peerDependencies)."
            exit 1
          fi
          echo "Host-singleton dependency policy OK."

  mobile:
    name: Mobile npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Same rationale as the frontend job: the mobile registration test
      # calls defineMobilePlugin(), which asserts the plugin's
      # pluginApiVersion against the SDK's PLUGIN_API_VERSION at import
      # time. Test against the branch-matched SDK build, not a stale npm
      # publish (same-branch-or-main).
      - name: Resolve shared ref (same branch as this build, else main)
        id: shared-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          REF="main"
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "main" ] && \
             git ls-remote --exit-code --heads \
               "https://x-access-token:${GH_TOKEN}@github.com/humdek-unibe-ch/sh-selfhelp_shared.git" \
               "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            REF="$BRANCH"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved sh-selfhelp_shared ref: ${REF} (build branch: ${BRANCH})"

      - name: Checkout shared (for the branch-matched SDK build)
        uses: actions/checkout@v4
        with:
          repository: humdek-unibe-ch/sh-selfhelp_shared
          ref: ${{ steps.shared-ref.outputs.ref }}
          path: .shared

      - name: Build shared + pack a local tarball
        working-directory: .shared
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm pack --pack-destination "$GITHUB_WORKSPACE"

      - name: Install dependencies
        working-directory: mobile
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Override @selfhelp/shared with the branch-built tarball
        working-directory: mobile
        run: |
          set -euo pipefail
          SHARED_TGZ="$(ls "$GITHUB_WORKSPACE"/selfhelp-shared-*.tgz | head -1)"
          echo "Overriding @selfhelp/shared with $SHARED_TGZ"
          npm install --no-save --no-audit --no-fund --legacy-peer-deps "$SHARED_TGZ"

      - name: Type-check
        working-directory: mobile
        run: npm run typecheck

      - name: Unit tests (Vitest) — renderer parity + registration snapshot
        working-directory: mobile
        run: npm run test

      - name: Build
        working-directory: mobile
        run: npm run build

      - name: Host-singleton policy
        working-directory: mobile
        run: |
          set -euo pipefail
          forbidden=$(node -e "
            const p = require('./package.json');
            const deps = p.dependencies || {};
            const hostOnly = ['react','react-native','expo-router','@selfhelp/shared'];
            const bad = hostOnly.filter(n => Object.prototype.hasOwnProperty.call(deps, n));
            console.log(bad.join(','));
          ")
          if [ -n "$forbidden" ]; then
            echo "::error::Host-singleton packages pinned under dependencies: $forbidden"
            exit 1
          fi
          echo "Host-singleton dependency policy OK."
