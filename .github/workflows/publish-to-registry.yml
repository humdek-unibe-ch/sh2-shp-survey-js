#
# Auto-publishes this plugin to the sh2-plugin-registry repo and a
# GitHub Release when a semver tag (`v*`) is pushed, or when
# triggered manually. Pipeline:
#
#   1. Validate plugin.json against the canonical schema (vendored
#      copy under docs/plugins/).
#   2. Build the frontend runtime via Vite (`dist/plugin.esm.js`
#      and `dist/plugin.css`).
#   3. Build the CONNECTED .shplugin with `scripts/build-shplugin.mjs
#      --mode connected`. Used by the registry publish step below
#      because the registry serves manifest + raw artifacts and the
#      host resolves the backend Composer package from the declared
#      `backend.composer.repository`.
#   4. If NPM_TOKEN is set, build + publish the read-only mobile
#      renderer (`@humdek/sh2-shp-survey-js-mobile`) to the public npm
#      registry. The host mobile build bundles it via plugins-sync, and
#      the selfhelp-mobile-preview image installs it by version, so the
#      mobile preview build only succeeds once this package is on npm.
#   5. If REGISTRY_PUSH_TOKEN is set, checkout the registry repo and
#      run `node scripts/publish-to-registry.mjs --skip-build --push`
#      to copy the manifest + artifacts and splice the signed
#      pluginEntry into registry.json.
#   6. Build the STANDALONE .shplugin (`--mode standalone`). The
#      standalone layout carries `backend/package/` inside the archive
#      so the host can install via a Composer path repository — no
#      Packagist / git fetch required for the plugin's own code. This
#      is the asset humans download from the GitHub Release for
#      offline / drag-and-drop installs.
#   7. Always: upload BOTH archives (connected + standalone) as
#      workflow artifacts and as GitHub Release assets.
#
# Required secrets:
#   SELFHELP_SIGNING_KEY      Ed25519 64-byte secret key (base64).
#   SELFHELP_SIGNING_KEY_ID   Publisher key id matching the
#                                    SELFHELP_PLUGIN_TRUSTED_KEYS entry
#                                    seeded on every SelfHelp host.
#   REGISTRY_PUSH_TOKEN              PAT with `contents:write` on
#                                    humdek-unibe-ch/sh2-plugin-registry.
#                                    Without it the workflow still
#                                    builds the .shplugin and publishes
#                                    the GH Release but skips the
#                                    registry update.
#   NPM_TOKEN                        npm automation token with publish
#                                    rights on the @humdek scope. Without
#                                    it the mobile renderer is NOT pushed
#                                    to npm and the selfhelp-mobile-preview
#                                    build cannot bundle this plugin.

name: publish-to-registry

on:
    push:
        tags: ["v*"]
    workflow_dispatch:
        inputs:
            channel:
                description: "Registry channel"
                required: true
                default: "stable"
                type: choice
                options: ["stable", "beta", "nightly"]

permissions:
    contents: write

jobs:
    publish:
        name: Build, sign, publish .shplugin
        runs-on: ubuntu-latest
        env:
            REGISTRY_PUSH_TOKEN: ${{ secrets.REGISTRY_PUSH_TOKEN }}
            NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        steps:
            - name: Check signing secrets are configured
              env:
                  SIGNING_KEY: ${{ secrets.SELFHELP_SIGNING_KEY }}
                  SIGNING_KEY_ID: ${{ secrets.SELFHELP_SIGNING_KEY_ID }}
              run: |
                  MISSING=""
                  [ -z "$SIGNING_KEY" ]    && MISSING="$MISSING SELFHELP_SIGNING_KEY"
                  [ -z "$SIGNING_KEY_ID" ] && MISSING="$MISSING SELFHELP_SIGNING_KEY_ID"
                  if [ -n "$MISSING" ]; then
                      echo "::error::Missing repository/organization secret(s):$MISSING"
                      echo "Signing requires BOTH the Ed25519 secret key and its key id."
                      echo "The key id names which trusted public key verifies the signature"
                      echo "(hosts pin it in SELFHELP_PLUGIN_TRUSTED_KEYS; the official"
                      echo "production key id is 'prod'). Set the secrets at org level so"
                      echo "every plugin repo inherits them."
                      exit 1
                  fi
                  echo "Signing secrets present (key id is set)."

            - name: Checkout plugin
              uses: actions/checkout@v4
              with:
                  path: plugin

            - name: Checkout sh2-plugin-registry (for shared sign.mjs)
              uses: actions/checkout@v4
              with:
                  repository: humdek-unibe-ch/sh2-plugin-registry
                  token: ${{ env.REGISTRY_PUSH_TOKEN != '' && env.REGISTRY_PUSH_TOKEN || github.token }}
                  path: sh2-plugin-registry
                  fetch-depth: 1

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install ajv-cli
              run: npm install -g ajv-cli ajv-formats

            - name: Install registry tooling
              working-directory: sh2-plugin-registry
              run: npm install --no-audit --no-fund

            - name: Configure git identity
              run: |
                  git config --global user.email "selfhelp-bot@unibe.ch"
                  git config --global user.name  "SelfHelp Plugin Bot"

            - name: Validate manifest against canonical schema
              working-directory: plugin
              run: ajv validate -c ajv-formats -s ../sh2-plugin-registry/plugin-manifest.schema.json -d plugin.json --strict=false

            - name: Build frontend runtime
              working-directory: plugin/frontend
              run: |
                  npm install --legacy-peer-deps --no-audit --no-fund
                  npm run build:runtime

            # Publish the read-only mobile renderer to the public npm registry.
            # The host mobile build bundles it: `scripts/plugins-sync.mjs` adds
            # `@humdek/sh2-shp-survey-js-mobile@<version>` to the mobile app's
            # dependencies and `npm install` resolves it from npm (the
            # selfhelp-mobile-preview image's web-preview/preview-plugins.json
            # pins the same version). Gated on the NPM_TOKEN secret: without it
            # the step is skipped with a notice and the .shplugin / registry
            # release still completes (but the mobile preview build cannot
            # install this package — set NPM_TOKEN at the org level to enable).
            - name: Publish mobile renderer to npm
              if: ${{ env.NPM_TOKEN != '' }}
              working-directory: plugin/mobile
              run: |
                  set -euo pipefail
                  npm install --legacy-peer-deps --no-audit --no-fund
                  npm run build
                  npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
                  PKG="$(node -p "require('./package.json').name")"
                  VER="$(node -p "require('./package.json').version")"
                  if npm view "${PKG}@${VER}" version > /dev/null 2>&1; then
                      echo "::notice::${PKG}@${VER} is already on npm; skipping publish."
                  else
                      npm publish --access public
                      echo "::notice::Published ${PKG}@${VER} to npm."
                  fi

            - name: Build connected .shplugin (registry publish)
              working-directory: plugin
              env:
                  SELFHELP_SIGNING_KEY: ${{ secrets.SELFHELP_SIGNING_KEY }}
                  SELFHELP_SIGNING_KEY_ID: ${{ secrets.SELFHELP_SIGNING_KEY_ID }}
              run: node scripts/build-shplugin.mjs --skip-build --mode connected

            - name: Extract plugin id + version
              id: pkg
              working-directory: plugin
              run: |
                  ID=$(jq -r '.id' plugin.json)
                  VER=$(jq -r '.version' plugin.json)
                  echo "id=$ID"   >> "$GITHUB_OUTPUT"
                  echo "ver=$VER" >> "$GITHUB_OUTPUT"
                  echo "archive=plugin/dist/${ID}-${VER}.shplugin" >> "$GITHUB_OUTPUT"
                  echo "standalone_archive=plugin/dist/${ID}-${VER}-standalone.shplugin" >> "$GITHUB_OUTPUT"

            - name: Extract per-version changelog notes
              id: notes
              working-directory: plugin
              run: |
                  VER="${{ steps.pkg.outputs.ver }}"
                  NOTES_FILE="$GITHUB_WORKSPACE/release-notes.md"
                  if [ ! -f CHANGELOG.md ]; then
                      echo "_No CHANGELOG.md present._" > "$NOTES_FILE"
                  else
                      # Extract the section between ## [<version>] and the next ## heading.
                      # Falls back to the full file if no matching section is found.
                      awk -v ver="$VER" '
                          BEGIN { found = 0 }
                          /^## / {
                              if (found == 1) { exit }
                              if (index($0, "[" ver "]") > 0 || index($0, " " ver " ") > 0 || index($0, " " ver "$") > 0) {
                                  found = 1
                                  print
                                  next
                              }
                          }
                          found == 1 { print }
                      ' CHANGELOG.md > "$NOTES_FILE"
                      if [ ! -s "$NOTES_FILE" ]; then
                          echo "_No matching section for ${VER} in CHANGELOG.md — full changelog attached below._" > "$NOTES_FILE"
                          echo "" >> "$NOTES_FILE"
                          cat CHANGELOG.md >> "$NOTES_FILE"
                      fi
                  fi
                  echo "" >> "$NOTES_FILE"
                  echo "---" >> "$NOTES_FILE"
                  echo "" >> "$NOTES_FILE"
                  echo "### Installation" >> "$NOTES_FILE"
                  echo "" >> "$NOTES_FILE"
                  echo "Drag-and-drop the attached \`.shplugin\` archive into **Admin → Plugins → Install plugin → Upload .shplugin** on your SelfHelp host, or install one-click from **Admin → Plugins → Available** if the official registry is enabled." >> "$NOTES_FILE"
                  echo "notes-file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

            - name: Publish to registry
              if: ${{ env.REGISTRY_PUSH_TOKEN != '' }}
              working-directory: plugin
              env:
                  CHANNEL: ${{ inputs.channel || 'stable' }}
                  SELFHELP_SIGNING_KEY: ${{ secrets.SELFHELP_SIGNING_KEY }}
                  SELFHELP_SIGNING_KEY_ID: ${{ secrets.SELFHELP_SIGNING_KEY_ID }}
              run: |
                  node scripts/publish-to-registry.mjs \
                      --registry "$GITHUB_WORKSPACE/sh2-plugin-registry" \
                      --channel  "$CHANNEL" \
                      --mode connected \
                      --skip-build \
                      --push

            # Build a STANDALONE .shplugin (carries backend/package/ so the
            # archive is self-contained — no Composer fetch from the
            # registry required). This is what humans download from the
            # GitHub Release and drag-and-drop into Admin → Plugins →
            # Upload .shplugin. The connected .shplugin built earlier
            # remains the source the registry publish consumed.
            - name: Build standalone .shplugin (GitHub Release asset)
              working-directory: plugin
              env:
                  SELFHELP_SIGNING_KEY: ${{ secrets.SELFHELP_SIGNING_KEY }}
                  SELFHELP_SIGNING_KEY_ID: ${{ secrets.SELFHELP_SIGNING_KEY_ID }}
              run: |
                  # build-shplugin.mjs always writes to dist/<id>-<ver>.shplugin.
                  # Move the connected archive out of the way so we keep both
                  # files and the standalone build does not clobber it.
                  mv "dist/${{ steps.pkg.outputs.id }}-${{ steps.pkg.outputs.ver }}.shplugin" \
                     "dist/${{ steps.pkg.outputs.id }}-${{ steps.pkg.outputs.ver }}-connected.shplugin"
                  node scripts/build-shplugin.mjs --skip-build --mode standalone
                  mv "dist/${{ steps.pkg.outputs.id }}-${{ steps.pkg.outputs.ver }}.shplugin" \
                     "dist/${{ steps.pkg.outputs.id }}-${{ steps.pkg.outputs.ver }}-standalone.shplugin"

            - name: Upload .shplugin archives as workflow artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.pkg.outputs.id }}-${{ steps.pkg.outputs.ver }}-shplugin
                  path: |
                      plugin/dist/${{ steps.pkg.outputs.id }}-${{ steps.pkg.outputs.ver }}-connected.shplugin
                      ${{ steps.pkg.outputs.standalone_archive }}

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ steps.pkg.outputs.id }} ${{ steps.pkg.outputs.ver }}
                  files: |
                      ${{ steps.pkg.outputs.standalone_archive }}
                      plugin/dist/${{ steps.pkg.outputs.id }}-${{ steps.pkg.outputs.ver }}-connected.shplugin
                  body_path: ${{ steps.notes.outputs.notes-file }}
                  fail_on_unmatched_files: true
                  token: ${{ github.token }}

            - name: Summary
              run: |
                  if [ -z "$REGISTRY_PUSH_TOKEN" ]; then
                      echo "::warning::REGISTRY_PUSH_TOKEN secret is not set."
                      echo ".shplugin was built and (if tagged) uploaded as a release asset,"
                      echo "but the registry was NOT updated. Add a PAT with contents:write on"
                      echo "humdek-unibe-ch/sh2-plugin-registry as REGISTRY_PUSH_TOKEN to enable"
                      echo "auto-publishing."
                  else
                      echo "Registry push token is set. Plugin published to sh2-plugin-registry."
                  fi
                  if [ -z "$NPM_TOKEN" ]; then
                      echo "::warning::NPM_TOKEN secret is not set — the mobile renderer"
                      echo "(@humdek/sh2-shp-survey-js-mobile) was NOT published to npm. The"
                      echo "selfhelp-mobile-preview build (sh-selfhelp_mobile) will fail with an"
                      echo "npm E404 until this package is on npm. Add an npm automation token"
                      echo "with publish rights on the @humdek scope as NPM_TOKEN."
                  else
                      echo "NPM_TOKEN is set. Mobile renderer published/ensured on npm."
                  fi
