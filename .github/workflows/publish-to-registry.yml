#
# Auto-publishes this plugin to the sh2-plugin-registry repo when a
# semver tag (`v*`) is pushed, or when triggered manually. The job:
#
#   1. Builds the plugin's frontend + mobile npm packages and runs the
#      existing `validate-plugin` CI checks.
#   2. Checks out the registry repo (humdek-unibe-ch/sh2-plugin-registry)
#      via a deploy key / PAT stored as the `REGISTRY_PUSH_TOKEN`
#      secret on this repo.
#   3. Runs `scripts/publish-to-registry.sh --push` so the registry's
#      `registry.json` is updated and a manifest file lands under
#      `manifests/<plugin-id>-<version>.json`.
#   4. The registry repo's own `build-registry.yml` workflow takes over
#      on the new commit and re-publishes to GitHub Pages.
#
# To enable this workflow, add a `REGISTRY_PUSH_TOKEN` secret (a PAT
# with `contents:write` on humdek-unibe-ch/sh2-plugin-registry).
# Without that secret the job will still build + validate, but skip
# the push step.

name: publish-to-registry

on:
    push:
        tags: ["v*"]
    workflow_dispatch:
        inputs:
            channel:
                description: "Registry channel"
                required: true
                default: "stable"
                type: choice
                options: ["stable", "beta", "alpha", "nightly"]

permissions:
    contents: read

jobs:
    publish:
        name: Publish to plugin registry
        runs-on: ubuntu-latest
        steps:
            - name: Checkout plugin
              uses: actions/checkout@v4
              with:
                  path: plugin

            - name: Checkout sh2-plugin-registry
              if: ${{ env.REGISTRY_PUSH_TOKEN != '' }}
              uses: actions/checkout@v4
              with:
                  repository: humdek-unibe-ch/sh2-plugin-registry
                  token: ${{ secrets.REGISTRY_PUSH_TOKEN }}
                  path: registry
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"

            - name: Install ajv-cli
              run: npm install -g ajv-cli ajv-formats

            - name: Configure git identity
              run: |
                  git config --global user.email "selfhelp-bot@unibe.ch"
                  git config --global user.name  "SelfHelp Plugin Bot"

            - name: Validate manifest
              working-directory: plugin
              run: ajv validate -c ajv-formats -s docs/plugins/plugin-manifest.schema.json -d plugin.json --strict=false

            - name: Build frontend
              working-directory: plugin/frontend
              run: |
                  npm install --legacy-peer-deps
                  npm run build

            - name: Build mobile
              working-directory: plugin/mobile
              run: |
                  npm install --legacy-peer-deps
                  npm run build

            - name: Publish to registry
              if: ${{ env.REGISTRY_PUSH_TOKEN != '' }}
              working-directory: plugin
              env:
                  CHANNEL: ${{ inputs.channel || 'stable' }}
              run: |
                  chmod +x scripts/publish-to-registry.sh
                  bash scripts/publish-to-registry.sh \
                      --registry "$GITHUB_WORKSPACE/registry" \
                      --channel  "$CHANNEL" \
                      --skip-build \
                      --push

            - name: Summary
              if: ${{ env.REGISTRY_PUSH_TOKEN == '' }}
              run: |
                  echo "::warning::REGISTRY_PUSH_TOKEN secret is not set."
                  echo "Build succeeded but the registry was not updated."
                  echo "Add a Personal Access Token with write access to"
                  echo "humdek-unibe-ch/sh2-plugin-registry as REGISTRY_PUSH_TOKEN"
                  echo "to enable auto-publishing."

        env:
            REGISTRY_PUSH_TOKEN: ${{ secrets.REGISTRY_PUSH_TOKEN }}
